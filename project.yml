name: WhisprPro
options:
  bundleIdPrefix: com.whisprpro
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: false

packages:
  WhisperCpp:
    path: Packages/WhisperCpp

targets:
  WhisprPro:
    type: application
    platform: macOS
    sources:
      - path: WhisprPro
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: WhisperCpp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whisprpro.app
        PRODUCT_NAME: WhisprPro
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "WhisprPro needs microphone access to record audio for transcription."
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: WhisprPro/WhisprPro.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  WhisprProTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WhisprProTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: WhisprPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whisprpro.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  WhisprPro:
    build:
      targets:
        WhisprPro: all
        WhisprProTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhisprProTests
